name: CI

# S2 hard gate: runs on every PR to main and on pushes to main.
# Enforces lint (ruff), formatting (black), and the unit-test suite with a
# coverage floor. See pyproject.toml for the ruff/black/coverage configuration.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint, format & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        # Scoped to the actively-maintained feature modules + tests; repo-wide
        # black normalization of legacy/generated modules is deferred.
        run: uv run black --check src/dct_mcp_server/tools/core/ tests/

      - name: Unit tests + coverage gate
        # fail_under (80%) and the coverage scope are configured in pyproject.toml
        # under [tool.coverage.*]. The build fails if coverage drops below the floor.
        run: uv run python -m pytest --cov=dct_mcp_server --cov-report=term-missing
